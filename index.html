<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// 🔥 תדביק כאן את ה־config שלך מ-Firebase
const firebaseConfig = {
  apiKey: "// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyCBa0XIboAWJIeiH6Wqer74sSiMyRKfK2s",
  authDomain: "game1-9d372.firebaseapp.com",
  projectId: "game1-9d372",
  storageBucket: "game1-9d372.firebasestorage.app",
  messagingSenderId: "387028062033",
  appId: "1:387028062033:web:7bf29040c7bb4b15d54d70"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);",
  authDomain: "PASTE_AUTH_DOMAIN",
  databaseURL: "PASTE_DATABASE_URL",
  projectId: "PASTE_PROJECT_ID",
  storageBucket: "PASTE_STORAGE_BUCKET",
  messagingSenderId: "PASTE_SENDER_ID",
  appId: "PASTE_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ====== לוגיקה פשוטה למשחק ======
let room = "";
let player = "p_" + Math.random().toString(36).slice(2,7);

window.createRoom = function(){
  room = Math.floor(100000 + Math.random()*900000).toString();
  set(ref(db, "rooms/"+room), {
    players: {[player]: true},
    question: "כמה זה 2+2?",
    answers: {}
  });
  startListen();
  alert("קוד חדר: " + room);
}

window.joinRoom = function(){
  room = document.getElementById("roomInput").value;
  update(ref(db, "rooms/"+room+"/players"), {
    [player]: true
  });
  startListen();
}

function startListen(){
  document.getElementById("game").style.display="block";
  onValue(ref(db, "rooms/"+room), (snap)=>{
    const data = snap.val();
    if(!data) return;

    document.getElementById("question").innerText = data.question;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    ["3","4","5"].forEach((a,i)=>{
      const btn = document.createElement("button");
      btn.innerText = a;
      btn.onclick = ()=>{
        update(ref(db, "rooms/"+room+"/answers"), {
          [player]: a
        });
      };
      answersDiv.appendChild(btn);
    });

    document.getElementById("status").innerText =
      JSON.stringify(data.answers);
  });
}
</script>

</head>
<body style="font-family:Arial;text-align:center">

<h2>משחק טריוויה Firebase</h2>

<button onclick="createRoom()">צור משחק</button>
<br><br>

<input id="roomInput" placeholder="קוד חדר">
<button onclick="joinRoom()">הצטרף</button>

<div id="game" style="display:none;margin-top:20px">
  <h3 id="question"></h3>
  <div id="answers"></div>
  <p id="status"></p>
</div>

</body>
</html>
